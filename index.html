<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Recipe App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    textarea {
      width: 80%;
      height: 90px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      margin: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.1);
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      background: white;
      color: black;
      border-radius: 15px;
      display: inline-block;
      max-width: 400px;
      animation: fade 0.5s;
    }

    #score {
      margin-top: 10px;
      font-size: 18px;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>

</head>

<body>

  <h1>🤖🎮 Ultimate Recipe App</h1>

  <p>Type or Speak ingredients 👇</p>

  <textarea id="ingredients" placeholder="egg, bread, milk"></textarea><br>

  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="generateRecipe()">✨ Generate Recipe</button>

  <div id="score">🏆 Points: 0</div>

  <div id="result">Your recipes will appear here 😋</div>

  <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

  <script>
    let points = 0;

    function playSound() {
      document.getElementById("clickSound").play();
    }

    function generateRecipe() {
      playSound();

      let input = document.getElementById("ingredients").value.toLowerCase();
      let result = document.getElementById("result");

      let recipes = [];

      // SMART RECIPE MATCHING
      if (input.includes("egg") && input.includes("bread")) {
        recipes.push("🍞🥚 Egg Sandwich: Cook egg, toast bread, combine.");
        points += 10;
      }

      if (input.includes("milk") && input.includes("rice")) {
        recipes.push("🍚🥛 Rice Kheer: Boil milk, add rice, cook sweet.");
        points += 10;
      }

      if (input.includes("maggi")) {
        recipes.push("🍜 Maggi: Boil water, add noodles & masala.");
        points += 5;
      }

      if (input.includes("bread") && input.includes("milk")) {
        recipes.push("🍞🥛 Bread Pudding: Mix and cook.");
        points += 8;
      }

      if (input.includes("egg") && input.includes("rice")) {
        recipes.push("🍳🍚 Egg Fried Rice: Fry rice with egg.");
        points += 12;
      }

      // RESULT
      if (recipes.length === 0) {
        result.innerText = "😅 No recipe found. Try new ingredients!";
      } else {
        result.innerText = "🎉 Recipes:\n\n" + recipes.join("\n\n");
      }

      document.getElementById("score").innerText = "🏆 Points: " + points;
    }

    // VOICE INPUT
    function startVoice() {
      let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.start();

      recognition.onresult = function(event) {
        document.getElementById("ingredients").value =
          event.results[0][0].transcript;
      }
    }
  </script>

</body>
</html>
